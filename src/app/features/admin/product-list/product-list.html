<div class="admin-page">
  <div class="admin-page__header">
    <h1 class="admin-page__title">Productos</h1>
    <a class="btn btn--primary" routerLink="/admin/productos/nuevo">+ Nuevo producto</a>
  </div>

  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Imagen</th>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Tipo</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (product of products(); track product.id) {
          <tr [class.table-row--inactive]="!product.isActive">
            <td>
              <img class="product-thumb" [src]="product.imageUrl" [alt]="product.name" />
            </td>
            <td>
              <strong>{{ product.name }}</strong>
            </td>
            <td>{{ product.categoryName }}</td>
            <td>
              <span class="sale-type sale-type--{{ product.saleType }}">{{ product.saleType }}</span>
            </td>
            <td>{{ product.price | currencyAr }}</td>
            <td>
              @if (editingStockId() === product.id) {
                <div class="stock-edit">
                  <input
                    class="stock-input"
                    type="number"
                    min="0"
                    [ngModel]="editingStockValue"
                    (ngModelChange)="editingStockValue = $event"
                    (keyup.enter)="saveStock(product)"
                    (keyup.escape)="cancelEditStock()"
                  />
                  <button class="stock-btn stock-btn--save" (click)="saveStock(product)" title="Guardar">✓</button>
                  <button class="stock-btn stock-btn--cancel" (click)="cancelEditStock()" title="Cancelar">✕</button>
                </div>
              } @else {
                <button
                  class="stock-display"
                  [class.low-stock]="product.stock <= 10 && product.stock > 0"
                  [class.no-stock]="product.stock === 0"
                  (click)="startEditStock(product)"
                  title="Click para editar stock"
                >
                  {{ product.stock }}
                </button>
              }
            </td>
            <td>
              <button class="status-toggle" [class.status-toggle--active]="product.isActive"
                (click)="toggleStatus(product)">
                {{ product.isActive ? '✅ Activo' : '⛔ Inactivo' }}
              </button>
            </td>
            <td>
              <div class="table-actions">
                <a class="btn btn--outline btn--xs" [routerLink]="['/admin/productos/editar', product.id]">Editar</a>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
