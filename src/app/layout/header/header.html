<header class="header">
  <div class="header__container">
    <a class="header__brand" routerLink="/" (click)="closeMenu()">
      <svg class="header__brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="20" cy="20" r="20" fill="currentColor" opacity="0.1"/>
        <path d="M12 14c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm0 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm2-10l12-4m-12 8l12 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="header__brand-text">
        <span class="header__brand-name">Capilar <strong>Shopping</strong></span>
        <span class="header__brand-tagline">Todo para tu cabello</span>
      </div>
    </a>

    <nav class="header__nav" [class.header__nav--open]="menuOpen">
      <a class="header__nav-link" routerLink="/" routerLinkActive="header__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Inicio</a>
      <a class="header__nav-link" routerLink="/productos" routerLinkActive="header__nav-link--active"
        (click)="closeMenu()">Productos</a>
      <a class="header__nav-link" routerLink="/combos" routerLinkActive="header__nav-link--active"
        (click)="closeMenu()">Combos</a>
      <a class="header__nav-link" routerLink="/peluquerias" routerLinkActive="header__nav-link--active"
        (click)="closeMenu()">Peluquerías</a>
      <a class="header__nav-link" routerLink="/mayorista" routerLinkActive="header__nav-link--active"
        (click)="closeMenu()">Mayorista</a>
    </nav>

    <div class="header__actions">
      <a class="header__cart" routerLink="/carrito" (click)="closeMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        @if (totalItems() > 0) {
          <span class="header__cart-badge">{{ totalItems() }}</span>
        }
      </a>

      <button class="header__burger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
